    { title: "AutoTranslater", desc: "Claude API 기반 한국어 ↔ 영어 자동 문서 번역 도구", tags: ["Claude API", "Python"], github: "https://github.com/dbwjdtn10/AutoTranslater" },
    { title: "SmartClip", desc: "AI 웹 클리퍼 Chrome 확장 — 요약/태깅/대화", tags: ["Chrome Extension", "Ollama"], github: "https://github.com/dbwjdtn10/smartclip" },
    { title: "CliChat", desc: "Rust + ratatui TUI 터미널 Ollama 채팅 클라이언트", tags: ["Rust", "ratatui", "Tokio"], github: "https://github.com/dbwjdtn10/clichat" },
    { title: "OllaBot", desc: "discord.py + Ollama 로컬 LLM Discord AI 챗봇", tags: ["discord.py", "Ollama"], github: "https://github.com/dbwjdtn10/ollabot" },
    { title: "Ocean Survivor", desc: "2D 벽돌깨기 어드벤처 게임 — Unity 팀프로젝트", tags: ["Unity", "C#", "WebGL"], github: "https://github.com/bupomya/OceanSurvivor" },
      { title: "Multi-Agent Dev System", desc: "Claude CLI 기반 4에이전트(PM/기획자/개발자/리뷰어) 소프트웨어 자동 개발 시스템", tags: ["Claude CLI", "멀티에이전트", "자가개선 루프"], github: "https://github.com/dbwjdtn10/GameArt-AI-Pipeline" },
    ];

    const SKILLS = {
      "Game Development": ["Unity 6.3", "Godot 4", "C#", "GDScript", "Object Pooling", "ScriptableObject", "State Machine", "Editor Tooling"],
      "AI / LLM": ["Stable Diffusion", "LoRA (diffusers+peft)", "ControlNet", "LangChain", "LangGraph", "RAG (Hybrid)", "Prompt Engineering", "Structured Output", "Gemini", "Claude API", "Ollama"],
      "ML / MLOps": ["XGBoost", "LightGBM", "Optuna", "SHAP", "MLflow", "DVC", "Airflow", "ONNX", "ML-Agents", "PPO", "clean-fid", "open_clip", "TensorBoard"],
      "Backend": ["FastAPI", "WebSocket", "Celery", "PostgreSQL", "Redis", "Docker", "JWT/API Key"],
      "Frontend": ["React", "TypeScript", "Tailwind CSS", "Streamlit"],
      "Infra / DevOps": ["Docker Compose", "GitHub Actions", "Prometheus", "Grafana", "AWS EC2"],
      "Languages": ["Python", "C#", "Rust", "GDScript", "TypeScript", "JavaScript"]
    };

    // ===== Components =====

    function Nav() {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const handler = () => setScrolled(window.scrollY > 50);
        window.addEventListener("scroll", handler);
        return () => window.removeEventListener("scroll", handler);
      }, []);
      return (
        <nav className={`fixed top-0 left-0 right-0 z-50 transition-all ${scrolled ? 'nav-blur border-b border-gray-800' : ''}`}>
          <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="#" className="text-lg font-bold gradient-text">YJS</a>
            <div className="flex gap-6 text-sm text-gray-400">
              <a href="#featured" className="hover:text-white transition">Projects</a>
              <a href="#skills" className="hover:text-white transition">Skills</a>
              <a href="#contact" className="hover:text-white transition">Contact</a>
              <a href={PROFILE.github} target="_blank" rel="noopener" className="hover:text-white transition">GitHub ↗</a>
            </div>
          </div>
        </nav>
      );
    }

    function Hero() {
      return (
        <section className="min-h-screen flex items-center justify-center px-6 pt-20">
          <div className="max-w-4xl text-center animate-in">
            <p className="text-indigo-400 text-sm font-medium tracking-widest uppercase mb-4">Portfolio</p>
            <h1 className="text-5xl md:text-7xl font-black mb-4">
              <span className="gradient-text">{PROFILE.name}</span>
            </h1>
            <p className="text-2xl md:text-3xl font-light text-gray-300 mb-6">{PROFILE.titleEn}</p>
            <p className="text-lg text-gray-400 max-w-2xl mx-auto mb-4">{PROFILE.intro}</p>
            <p className="text-base text-gray-500 max-w-2xl mx-auto mb-10">{PROFILE.subIntro}</p>
            <div className="flex justify-center gap-4 flex-wrap">
              <a href="#featured" className="px-8 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-medium transition">프로젝트 보기</a>
              <a href={PROFILE.github} target="_blank" rel="noopener" className="px-8 py-3 border border-gray-600 hover:border-indigo-400 rounded-lg font-medium transition">GitHub ↗</a>
            </div>
          </div>
        </section>
      );
    }

    function MetricCard({ label, value, desc }) {
      return (
        <div className="metric-card rounded-lg p-4 text-center">
          <div className="text-2xl font-black text-white">{value}</div>
          <div className="text-xs text-gray-400 mt-1">{label}</div>
          <div className="text-xs text-gray-500">{desc}</div>
        </div>
      );
    }

    function FeaturedProject({ project, index }) {
      const [expanded, setExpanded] = useState(false);
      return (
        <div className="featured-card rounded-2xl p-8 card-hover glow mb-8">
          <div className="flex items-start justify-between mb-6">
            <div>
              <span className="text-xs font-medium px-3 py-1 rounded-full" style={{background: `${project.color}20`, color: project.color}}>{project.category}</span>
              <h3 className="text-3xl font-bold text-white mt-3">{project.icon} {project.title}</h3>
              <p className="text-gray-400 mt-1">{project.subtitle}</p>
            </div>
            <div className="flex gap-2">
              {project.demo && <a href={project.demo} target="_blank" rel="noopener" className="text-sm px-3 py-1 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white transition">Live Demo ↗</a>}
              <a href={project.github} target="_blank" rel="noopener" className="text-gray-500 hover:text-white transition text-sm border border-gray-700 px-3 py-1 rounded-lg">GitHub ↗</a>
            </div>
          </div>

          <p className="text-gray-300 mb-6 leading-relaxed">{project.description}</p>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
            {project.metrics.map((m, i) => <MetricCard key={i} {...m} />)}
          </div>

          <div className="flex flex-wrap gap-2 mb-6">
            {project.techStack.map((tech, i) => (
              <span key={i} className="tech-badge text-xs px-3 py-1 rounded-full text-blue-300">{tech}</span>
            ))}
          </div>

          <div className="mb-4">
            <h4 className="text-sm font-semibold text-gray-300 mb-3 uppercase tracking-wider">핵심 구현</h4>
            <ul className="space-y-2">
              {(expanded ? project.highlights : project.highlights.slice(0, 4)).map((h, i) => (
                <li key={i} className="flex items-start gap-2 text-sm text-gray-400">
                  <span className="text-indigo-400 mt-0.5">▸</span>
                  <span>{h}</span>
                </li>
              ))}
            </ul>
            {project.highlights.length > 4 && (
              <button onClick={() => setExpanded(!expanded)} className="text-indigo-400 text-sm mt-2 hover:text-indigo-300 transition">
                {expanded ? "접기 ▲" : `+${project.highlights.length - 4}개 더 보기 ▼`}
              </button>
            )}
          </div>

          <div>
            <h4 className="text-sm font-semibold text-gray-300 mb-3 uppercase tracking-wider">기술적 의사결정</h4>
            <div className="space-y-2">
              {project.decisions.map((d, i) => (
                <div key={i} className="pipeline-step rounded-lg p-3">
                  <span className="text-white text-sm font-medium">{d.decision}</span>
                  <p className="text-gray-500 text-xs mt-1">→ {d.reason}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function OtherProject({ project }) {
      return (
        <a href={project.github} target="_blank" rel="noopener" className="other-card rounded-xl p-5 card-hover block">
          <h4 className="text-white font-semibold mb-2">{project.title}</h4>
          <p className="text-gray-500 text-sm mb-3">{project.desc}</p>
          <div className="flex flex-wrap gap-1">
            {project.tags.map((tag, i) => (
              <span key={i} className="text-xs px-2 py-0.5 rounded bg-gray-800 text-gray-400">{tag}</span>
            ))}
          </div>
        </a>
      );
    }

    function SkillsSection() {
      return (
        <section id="skills" className="py-20 px-6">
          <div className="max-w-6xl mx-auto">
            <h2 className="text-3xl font-bold text-center text-white mb-12">Tech Stack</h2>
            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
              {Object.entries(SKILLS).map(([category, skills]) => (
                <div key={category} className="other-card rounded-xl p-5">
                  <h3 className="text-indigo-400 font-semibold text-sm mb-3 uppercase tracking-wider">{category}</h3>
                  <div className="flex flex-wrap gap-2">
                    {skills.map((skill, i) => (
                      <span key={i} className="tech-badge text-xs px-3 py-1 rounded-full text-gray-300">{skill}</span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Contact() {
      return (
        <section id="contact" className="py-20 px-6">
          <div className="max-w-2xl mx-auto text-center">
            <h2 className="text-3xl font-bold text-white mb-4">Contact</h2>
            <p className="text-gray-400 mb-8">게임 AI 개발에 대해 이야기하고 싶으시다면 연락해주세요.</p>
            <div className="flex justify-center gap-6 flex-wrap">
              <a href={`mailto:${PROFILE.email}`} className="flex items-center gap-2 text-gray-300 hover:text-indigo-400 transition">
                <span>📧</span> {PROFILE.email}
              </a>
              <a href={PROFILE.github} target="_blank" rel="noopener" className="flex items-center gap-2 text-gray-300 hover:text-indigo-400 transition">
                <span>💻</span> GitHub
              </a>
            </div>
          </div>
        </section>
      );
    }

    function App() {
      return (
        <div>
          <Nav />
          <Hero />
          <div className="section-divider max-w-4xl mx-auto" />

          <section id="featured" className="py-20 px-6">
            <div className="max-w-5xl mx-auto">
              <div className="text-center mb-16">
                <p className="text-indigo-400 text-sm font-medium tracking-widest uppercase mb-2">Featured</p>
                <h2 className="text-3xl font-bold text-white">핵심 프로젝트</h2>
              </div>
              {FEATURED_PROJECTS.map((p, i) => <FeaturedProject key={p.id} project={p} index={i} />)}
            </div>
          </section>

          <div className="section-divider max-w-4xl mx-auto" />

          <section className="py-20 px-6">
            <div className="max-w-6xl mx-auto">
              <div className="text-center mb-12">
                <p className="text-gray-500 text-sm font-medium tracking-widest uppercase mb-2">More</p>
                <h2 className="text-3xl font-bold text-white">기타 프로젝트</h2>
              </div>
              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                {OTHER_PROJECTS.map((p, i) => <OtherProject key={i} project={p} />)}
              </div>
            </div>
          </section>

          <div className="section-divider max-w-4xl mx-auto" />
          <SkillsSection />
          <div className="section-divider max-w-4xl mx-auto" />
          <Contact />

          <footer className="py-8 text-center text-gray-600 text-sm border-t border-gray-800">
            <p>© 2026 유정수. Built with React.</p>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
